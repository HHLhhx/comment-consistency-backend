# 应用服务器配置
server:
  port: ${SERVER_PORT:8080}

# Spring Boot 应用配置
spring:
  application:
    name: comment-backend
  ai:
    vectorstore:
      milvus:
        client:
          host: ${SPRING_AI_VECTORSTORE_MILVUS_CLIENT_HOST:127.0.0.1}
          port: ${SPRING_AI_VECTORSTORE_MILVUS_CLIENT_PORT:19530}
        databaseName: ${SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME:comment_consistency}
        collectionName: ${SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME:comment_vector_store}
        initialize-schema: ${SPRING_AI_VECTORSTORE_MILVUS_INITIALIZE_SCHEMA:true}
        embeddingDimension: ${SPRING_AI_VECTORSTORE_MILVUS_EMBEDDING_DIMENSION:1024}
        indexType: IVF_FLAT
        metricType: COSINE
        auto-id: false
        embedding-field-name: "vector"
        content-field-name: "content"
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/comment_consistency?useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:123456}
      database: ${SPRING_DATA_REDIS_DATABASE:1}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

# 日志配置
logging:
  level:
    root: INFO
    com.nju.comment.backend: DEBUG
    org.springframework.ai: INFO
    org.springframework.web: INFO
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/comment.log

# 应用配置
app:
  thread-pool:
    llm-pool:
      core-size: 20
      max-size: 50
      queue-capacity: 1000
      keep-alive: 60
      thread-name-prefix: llm-executor-
  ai:
    llm:
      timeout-ms: 30000
    ollama:
      chat:
        base-url: ${APP_AI_OLLAMA_CHAT_BASE_URL:https://ollama.com}
      embedding:
        base-url: ${APP_AI_OLLAMA_EMBEDDING_BASE_URL:http://localhost:11434}
        model: ${APP_AI_OLLAMA_EMBEDDING_MODEL:qwen3-embedding:0.6b}
  vectorstore:
    init: ${APP_VECTORSTORE_INIT:false}
  cache:
    comment:
      ttl: 3600 # 1小时
    modelsList:
      max-size: 100
      ttl: 60 # 1分钟
  jwt:
    header: ${APP_JWT_HEADER:Authorization}
    secret: ${APP_JWT_SECRET:${JWT_SECRET:}}
    expiration: ${APP_JWT_EXPIRATION:604800000} # 7天
  security:
    # 用于 AES-GCM 加密存储用户 API Key 的 256 位密钥（64 个十六进制字符）
    api-key-encrypt-key: ${APP_SECURITY_API_KEY_ENCRYPT_KEY:${API_KEY_ENCRYPT_KEY:}}
