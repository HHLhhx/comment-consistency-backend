# 应用服务器配置
server:
  port: ${SERVER_PORT:8080}

# Spring Boot 应用配置
spring:
  application:
    name: comment-backend
  ai:
    vectorstore:
      milvus:
        client:
          host: ${SPRING_AI_VECTORSTORE_MILVUS_CLIENT_HOST:127.0.0.1}
          port: ${SPRING_AI_VECTORSTORE_MILVUS_CLIENT_PORT:19530}
        databaseName: ${SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME:comment_consistency}
        collectionName: ${SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME:comment_vector_store}
        initialize-schema: ${SPRING_AI_VECTORSTORE_MILVUS_INITIALIZE_SCHEMA:true}
        embeddingDimension: ${SPRING_AI_VECTORSTORE_MILVUS_EMBEDDING_DIMENSION:1024}
        indexType: IVF_FLAT
        metricType: COSINE
        auto-id: false
        embedding-field-name: "vector"
        content-field-name: "content"
  jpa:
    hibernate:
      ddl-auto: update
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/comment_consistency?useSSL=false&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:1}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:5000ms}
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

# 日志配置
logging:
  level:
    root: INFO
    com.nju.comment.backend: DEBUG
    org.springframework.ai: INFO
    org.springframework.web: INFO
    org.springframework.cache: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/comment.log

# 应用配置
app:
  thread-pool:
    llm-pool:
      core-size: 20
      max-size: 50
      queue-capacity: 1000
      keep-alive: 60
      thread-name-prefix: llm-executor-
  ai:
    llm:
      timeout-ms: 30000
    openai:
      chat:
        # 默认走 OpenAI 官方端点，用户也可在用户设置中按需覆盖为兼容 OpenAI 协议的供应商地址
        # 例如：https://api.deepseek.com、https://dashscope.aliyuncs.com/compatible-mode、
        #       https://api.moonshot.cn、https://open.bigmodel.cn/api/paas 等
        base-url: ${APP_AI_OPENAI_CHAT_BASE_URL:https://api.openai.com}
        # OpenAI 协议下 chat completion / models 列表的统一前缀
        completions-path: ${APP_AI_OPENAI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        models-path: ${APP_AI_OPENAI_CHAT_MODELS_PATH:/v1/models}
    siliconflow:
      embedding:
        base-url: ${APP_AI_SILICONFLOW_EMBEDDING_BASE_URL:https://api.siliconflow.cn}
        embeddings-path: ${APP_AI_SILICONFLOW_EMBEDDINGS_PATH:/v1/embeddings}
        api-key: ${APP_AI_SILICONFLOW_EMBEDDING_API_KEY:}
        model: ${APP_AI_SILICONFLOW_EMBEDDING_MODEL:BAAI/bge-m3}
        max-retries: ${APP_AI_SILICONFLOW_EMBEDDING_MAX_RETRIES:5}
        initial-backoff-ms: ${APP_AI_SILICONFLOW_EMBEDDING_INITIAL_BACKOFF_MS:1000}
        max-backoff-ms: ${APP_AI_SILICONFLOW_EMBEDDING_MAX_BACKOFF_MS:10000}
        rate-limit:
          rpm: ${APP_AI_SILICONFLOW_EMBEDDING_RPM:2000}
          tpm: ${APP_AI_SILICONFLOW_EMBEDDING_TPM:500000}
          window-ms: ${APP_AI_SILICONFLOW_EMBEDDING_WINDOW_MS:60000}
  vectorstore:
    init: ${APP_VECTORSTORE_INIT:false}
    embedding-batch-size: ${APP_VECTORSTORE_EMBEDDING_BATCH_SIZE:32}
    embedding-max-input-chars: ${APP_VECTORSTORE_EMBEDDING_MAX_INPUT_CHARS:8000}
    progress-file: ${APP_VECTORSTORE_PROGRESS_FILE:src/main/resources/docs/vectorstore-init-progress.properties}
    clear-progress-on-success: ${APP_VECTORSTORE_CLEAR_PROGRESS_ON_SUCCESS:true}
  cache:
    comment:
      ttl: 3600 # 1小时
    modelsList:
      max-size: 100
      ttl: 60 # 1分钟
  jwt:
    header: ${APP_JWT_HEADER:Authorization}
    secret: ${APP_JWT_SECRET:${JWT_SECRET:}}
    expiration: ${APP_JWT_EXPIRATION:604800000} # 7天
  security:
    # 用于 AES-GCM 加密存储用户 API Key 的 256 位密钥（64 个十六进制字符）
    api-key-encrypt-key: ${APP_SECURITY_API_KEY_ENCRYPT_KEY:${API_KEY_ENCRYPT_KEY:}}
    # 用于请求体敏感字段（密码/API Key）解密的 RSA 私钥（PKCS8 Base64）
    request-decrypt-private-key: ${APP_SECURITY_REQUEST_DECRYPT_PRIVATE_KEY:}
    # 对应 RSA 公钥（X.509 Base64），供插件端拉取后加密请求字段
    request-encrypt-public-key: ${APP_SECURITY_REQUEST_ENCRYPT_PUBLIC_KEY:}
  mail:
    aliyun:
      access-key-id: ${APP_ALIYUN_ACCESS_KEY_ID:}
      access-key-secret: ${APP_ALIYUN_ACCESS_KEY_SECRET:}
      account-name: ${APP_ALIYUN_ACCOUNT_NAME:}
      region-id: ${APP_ALIYUN_REGION_ID:cn-hangzhou}
      address-type: ${APP_ALIYUN_ADDRESS_TYPE:1}
      from-alias: ${APP_ALIYUN_FROM_ALIAS:comment-consistency}
