# Prometheus 抓取配置：定时拉 Spring Boot Actuator 暴露的 /actuator/prometheus
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    monitor: comment-consistency

scrape_configs:
  # 自身
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # 应用：通过 docker-compose 内部网络，使用服务名 backend
  - job_name: comment-backend
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: comment-backend

  # 可选：监控 Prometheus 抓取自身状态
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
