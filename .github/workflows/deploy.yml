name: Build and Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/comment-consistency-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_NAME}:${GITHUB_REF_NAME}-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy by SSH with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          BRANCH_NAME: ${{ github.ref_name }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEFAULT_DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
          NGINX_HTTP_PORT: ${{ secrets.NGINX_HTTP_PORT }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          DOCKER_VOLUME_DIRECTORY: ${{ secrets.DOCKER_VOLUME_DIRECTORY }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_KEY_ENCRYPT_KEY: ${{ secrets.API_KEY_ENCRYPT_KEY }}
          REQUEST_DECRYPT_PRIVATE_KEY: ${{ secrets.REQUEST_DECRYPT_PRIVATE_KEY }}
          REQUEST_ENCRYPT_PUBLIC_KEY: ${{ secrets.REQUEST_ENCRYPT_PUBLIC_KEY }}
          APP_VECTORSTORE_INIT: ${{ secrets.APP_VECTORSTORE_INIT }}
          APP_AI_OPENAI_CHAT_BASE_URL: ${{ secrets.APP_AI_OPENAI_CHAT_BASE_URL }}
          APP_AI_SILICONFLOW_EMBEDDING_API_KEY: ${{ secrets.APP_AI_SILICONFLOW_EMBEDDING_API_KEY }}
          ATTU_BIND_IP: ${{ secrets.ATTU_BIND_IP }}
          ATTU_PORT: ${{ secrets.ATTU_PORT }}
          SPRING_MAIL_USERNAME: ${{ secrets.SPRING_MAIL_USERNAME }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
          SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME: ${{ secrets.SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME }}
          SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME: ${{ secrets.SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME }}
          APP_ALIYUN_ACCESS_KEY_ID: ${{ secrets.APP_ALIYUN_ACCESS_KEY_ID }}
          APP_ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.APP_ALIYUN_ACCESS_KEY_SECRET }}
          APP_ALIYUN_ACCOUNT_NAME: ${{ secrets.APP_ALIYUN_ACCOUNT_NAME }}
          APP_ALIYUN_REGION_ID: ${{ secrets.APP_ALIYUN_REGION_ID }}
          PROMETHEUS_PORT: ${{ secrets.PROMETHEUS_PORT }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GRAFANA_PORT: ${{ secrets.GRAFANA_PORT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          envs: REPOSITORY,IMAGE_TAG,BRANCH_NAME,DEPLOY_PATH,DEFAULT_DEPLOY_PATH,APP_PORT,NGINX_HTTP_PORT,MYSQL_DATABASE,MYSQL_USER,DOCKER_VOLUME_DIRECTORY,MYSQL_ROOT_PASSWORD,MYSQL_PASSWORD,REDIS_PASSWORD,JWT_SECRET,API_KEY_ENCRYPT_KEY,REQUEST_DECRYPT_PRIVATE_KEY,REQUEST_ENCRYPT_PUBLIC_KEY,APP_VECTORSTORE_INIT,APP_AI_OPENAI_CHAT_BASE_URL,APP_AI_SILICONFLOW_EMBEDDING_API_KEY,ATTU_BIND_IP,ATTU_PORT,SPRING_MAIL_USERNAME,SPRING_MAIL_PASSWORD,SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME,SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME,APP_ALIYUN_ACCESS_KEY_ID,APP_ALIYUN_ACCESS_KEY_SECRET,APP_ALIYUN_ACCOUNT_NAME,APP_ALIYUN_REGION_ID,PROMETHEUS_PORT,GRAFANA_ADMIN_USER,GRAFANA_ADMIN_PASSWORD,GRAFANA_PORT
          script_path: deploy/remote-deploy.sh
