services:
  nginx:
    container_name: ccb-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    container_name: ccb-backend
    # 本地：若本机没有该 tag 的镜像，docker compose 会用下面的 build 段从源码构建。
    # 生产 / CI：APP_IMAGE 通常被设为 ghcr.io/<owner>/<repo>:<sha>，docker compose 会直接使用远程镜像。
    image: ${APP_IMAGE:-comment-consistency-backend:local}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/backend/logs:/app/logs
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-comment_consistency}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-comment_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_AI_VECTORSTORE_MILVUS_CLIENT_HOST: standalone
      SPRING_AI_VECTORSTORE_MILVUS_CLIENT_PORT: 19530
      SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME: ${SPRING_AI_VECTORSTORE_MILVUS_DATABASE_NAME:-comment_consistency}
      SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME: ${SPRING_AI_VECTORSTORE_MILVUS_COLLECTION_NAME:-comment_vector_store}
      APP_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_SECURITY_API_KEY_ENCRYPT_KEY: ${API_KEY_ENCRYPT_KEY:?API_KEY_ENCRYPT_KEY is required}
      APP_SECURITY_REQUEST_DECRYPT_PRIVATE_KEY: ${REQUEST_DECRYPT_PRIVATE_KEY:-}
      APP_SECURITY_REQUEST_ENCRYPT_PUBLIC_KEY: ${REQUEST_ENCRYPT_PUBLIC_KEY:-}
      APP_VECTORSTORE_INIT: ${APP_VECTORSTORE_INIT:-false}
      APP_AI_OPENAI_CHAT_BASE_URL: ${APP_AI_OPENAI_CHAT_BASE_URL:-https://api.openai.com}
      APP_AI_SILICONFLOW_EMBEDDING_API_KEY: ${APP_AI_SILICONFLOW_EMBEDDING_API_KEY:-}
      APP_ALIYUN_ACCESS_KEY_ID: ${APP_ALIYUN_ACCESS_KEY_ID:-}
      APP_ALIYUN_ACCESS_KEY_SECRET: ${APP_ALIYUN_ACCESS_KEY_SECRET:-}
      APP_ALIYUN_ACCOUNT_NAME: ${APP_ALIYUN_ACCOUNT_NAME:-}
      APP_ALIYUN_REGION_ID: ${APP_ALIYUN_REGION_ID:-}
    depends_on:
      - mysql
      - redis
      - standalone

  mysql:
    container_name: ccb-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-comment_consistency}
      MYSQL_USER: ${MYSQL_USER:-comment_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 10

  redis:
    container_name: ccb-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "6379:6379"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 10

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.11
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  # =============== 监控栈 ===============
  prometheus:
    container_name: ccb-prometheus
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/prometheus:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - backend

  grafana:
    container_name: ccb-grafana
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/grafana:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

networks:
  default:
    name: comment-consistency-network